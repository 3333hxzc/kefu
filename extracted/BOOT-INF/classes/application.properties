# Spring Boot 客服系统后端配置
server.port=8080

# 应用名称
spring.application.name=kefu-backend

# MySQL 数据库配置
# 生产环境请使用环境变量: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/kefu2?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.driverClassName=com.mysql.jdbc.Driver
spring.datasource.username=${DB_USERNAME:kefu2}
spring.datasource.password=${DB_PASSWORD:kefu2}

# JWT配置 - 生产环境必须设置环境变量 JWT_SECRET (至少32字符)
jwt.secret=${JWT_SECRET:xQ7#pZ9&vM2!kL4*sN1@bR3^fT5$gH8%jW6+eY0~dU}

# 公共访问地址
app.public-url=${APP_PUBLIC_URL:https://hxzc33.cc.cd}
app.frontend-url=${APP_FRONTEND_URL:https://hxzc33.cc.cd}

# 默认管理员账号
app.admin.username=${APP_ADMIN_USERNAME:hxzc33}
app.admin.password=${APP_ADMIN_PASSWORD:123456}

# JPA 配置
spring.jpa.database-platform=org.hibernate.dialect.MySQL57Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

